name: CI

on:
  push:
    branches: ["main", "dev"]
  pull_request:
    branches: ["main"]

jobs:
  # ── Validate manifest, strings, translations, and integration structure ──
  hassfest:
    name: Hassfest validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: "home-assistant/actions/hassfest@master"

  # ── HACS custom integration validation ─────────────────────────────────
  hacs:
    name: HACS validation
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - name: HACS Action
        uses: hacs/action@main
        with:
          category: integration

  # ── Lint with ruff ──────────────────────────────────────────────────────
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Install ruff
        run: pip install ruff
      - name: Run ruff check
        run: ruff check custom_components/scrutiny/
      - name: Run ruff format check
        run: ruff format --check custom_components/scrutiny/

  # ── Test suite ──────────────────────────────────────────────────────────
  # Uses stdlib unittest + ha_stubs (no external HA installation required).
  # The ha_stubs module provides accurate minimal stubs for all HA classes
  # used by the integration, so tests run in plain Python with no network
  # access needed during CI.
  tests:
    name: Tests (Python 3.14)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"
      - name: Run test suite
        run: python3 tests/run_tests.py
