rules:
  # ── Bronze ────────────────────────────────────────────────────────────────
  action-setup:
    status: exempt
    comment: This integration does not register any service actions.
  appropriate-polling:
    status: done
    comment: Poll interval is user-configurable via the options flow, defaulting to 60 minutes.
  brands:
    status: done
    comment: >
      Brand assets (icon, logo) can be placed in a brand/ directory in the
      integration root as of HA 2026.3. Branding files are not included here
      as this is a custom integration maintained separately from the brands CDN.
  common-modules: done
  config-flow-test-coverage: done
  config-flow: done
  dependency-transparency: done
  docs-actions:
    status: exempt
    comment: This integration does not register any service actions.
  docs-high-level-description: done
  docs-installation-instructions: done
  docs-removal-instructions: done
  entity-event-setup:
    status: exempt
    comment: Entities use DataUpdateCoordinator; no direct HA event subscriptions are made.
  entity-unique-id: done
  has-entity-name: done
  runtime-data: done
  test-before-configure: done
  test-before-setup: done
  unique-config-entry: done

  # ── Silver ────────────────────────────────────────────────────────────────
  action-exceptions:
    status: exempt
    comment: No service actions are registered.
  config-entry-unloading: done
  docs-configuration-parameters: done
  docs-installation-parameters: done
  entity-unavailable: done
  integration-owner: done
  log-when-unavailable: done
  parallel-updates: done
  reauthentication-flow:
    status: exempt
    comment: Scrutiny does not use authentication.
  test-coverage: done

  # ── Gold ──────────────────────────────────────────────────────────────────
  devices: done
  diagnostics: done
  discovery-update-info:
    status: exempt
    comment: Scrutiny is not a discoverable device type.
  discovery:
    status: exempt
    comment: Scrutiny is not a discoverable device type.
  docs-data-update: done
  docs-examples: done
  docs-known-limitations: done
  docs-supported-devices: done
  docs-supported-functions: done
  docs-troubleshooting: done
  docs-use-cases: done
  dynamic-devices:
    status: exempt
    comment: Disk list is static per Scrutiny instance; hot-plug is not applicable.
  entity-category: done
  entity-device-class: done
  entity-disabled-by-default:
    status: done
    comment: >
      SMART attribute sensors are not created at all unless the user opts in
      via the enable_critical_attrs or enable_all_attrs options. This prevents
      UI clutter more effectively than disabling entities after creation.
  entity-translations: done
  exception-translations:
    status: exempt
    comment: >
      This integration has no service actions and raises no HomeAssistantError
      subclasses directly to the user. All user-visible error messages are
      provided via config flow and options flow error keys in strings.json.
  icon-translations: done
  reconfiguration-flow: done
  repair-issues:
    status: exempt
    comment: No automated repair issues are applicable.
  stale-devices:
    status: done
    comment: >
      After each successful poll returning at least one disk, the coordinator
      removes HA device entries for disk identifiers no longer present in the API response.
      The guard (len > 0) prevents accidental wipeout on API failure.
      Users may also manually delete device entries via the UI.

  # ── Platinum ──────────────────────────────────────────────────────────────
  async-dependency:
    status: done
    comment: aiohttp (>=3.11.0) is fully async.
  inject-websession: done
  strict-typing:
    status: done
    comment: >
      py.typed marker is present. All public functions and methods carry
      complete type annotations. Python 3.14 is the minimum target, so lazy
      annotation evaluation is the default and no import shim is required.
